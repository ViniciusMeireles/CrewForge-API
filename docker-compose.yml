services:
  postgres_db:
    image: postgres:18
    volumes:
      - postgres_data_crew_forge_pg18:/var/lib/postgresql/18/data
    environment:
      PGDATA: /var/lib/postgresql/18/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crew_forge_network

  django_api:
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    working_dir: /app
    networks:
      - crew_forge_network

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - ./.mailpit-data:/.mailpit-data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /.mailpit-data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - crew_forge_network

volumes:
  postgres_data_crew_forge_pg18:
    name: postgres_data_crew_forge_pg18

networks:
  crew_forge_network:
    driver: bridge
