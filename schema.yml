          Type of organization image

          * `logo` - Logo
          * `cover` - Cover
          * `favicon` - Favicon
          * `og_image` - Open Graph Image
          * `logo_horizontal` - Logo Horizontal
          * `logo_vertical` - Logo Vertical
          * `logo_dark` - Logo Dark
