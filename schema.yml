openapi: 3.0.3
info:
  title: CrewForge API
  version: 1.0.0
  description: "API service for managing accounts, teams, and permissions with comprehensive\n
    \       organizational hierarchy support.\n        CrewForge provides a comprehensive
    foundation for building applications\n        requiring sophisticated organizational
    structures, team management, and\n        permission systems with enterprise-grade
    security and scalability.\n    "
paths:
  /api/accounts/invitations/:
    get:
      operationId: accounts_invitations_list
      description: List all Invitations.
      parameters:
      - in: query
        name: email
        schema:
          type: string
      - in: query
        name: email__icontains
        schema:
          type: string
      - in: query
        name: expired_at
        schema:
          type: string
          format: date-time
      - in: query
        name: expired_at__gt
        schema:
          type: string
          format: date-time
      - in: query
        name: expired_at__lt
        schema:
          type: string
          format: date-time
      - in: query
        name: is_accepted
        schema:
          type: boolean
      - in: query
        name: is_expired
        schema:
          type: boolean
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - admin
          - manager
          - member
          - owner
        description: |-
          User role in the organization

          * `owner` - Owner
          * `admin` - Admin
          * `manager` - Manager
          * `member` - Member
      - in: query
        name: role__in
        schema:
          type: array
          items:
            type: string
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      tags:
      - Invitations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInvitationList'
          description: ''
    post:
      operationId: accounts_invitations_create
      description: Create a new Invitation.
      tags:
      - Invitations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invitation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Invitation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Invitation'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/accounts/invitations/{id}/:
    get:
      operationId: accounts_invitations_retrieve
      description: Retrieve a specific Invitation.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Invitation.
        required: true
      tags:
      - Invitations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
    put:
      operationId: accounts_invitations_update
      description: Update a Invitation.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Invitation.
        required: true
      tags:
      - Invitations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invitation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Invitation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Invitation'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
    delete:
      operationId: accounts_invitations_destroy
      description: Delete a Invitation.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Invitation.
        required: true
      tags:
      - Invitations
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/accounts/invitations/{id}/send-email/:
    post:
      operationId: accounts_invitations_send_email_create
      description: Send an invitation email.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Invitation.
        required: true
      tags:
      - Invitations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendInviteEmailSuccess'
              examples:
                InvitationEmailSentSuccessfully.:
                  value:
                    detail: Invitation email sent successfully.
                  summary: Invitation email sent successfully.
          description: The invitation email has been sent successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendInviteEmailBadRequest'
              examples:
                InvitationIsExpired:
                  value:
                    detail: Invitation is expired
                  summary: Invitation is expired
                UserIsAlreadyAMember:
                  value:
                    detail: User is already a member
                  summary: User is already a member
          description: The invitation is expired or the user is already a member.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendInviteEmailTooManyRequests'
              examples:
                AnInvitationEmailWasRecentlySent.PleaseWaitBeforeResending.:
                  value:
                    detail: An invitation email was recently sent. Please wait before
                      resending.
                    code: cooldown_active
                    retry_after_seconds: 60
                  summary: An invitation email was recently sent. Please wait before
                    resending.
          description: The invitation email cooldown is active.
  /api/accounts/invitations/choices/:
    get:
      operationId: accounts_invitations_choices_retrieve
      description: List invitations for choices (value/label format).
      tags:
